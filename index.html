<script>

let categories=[
'وجبات',
'مشروبات',
'تشكن برجر',
'اطباق جانبيه',
'إضافات',
'وجبات الأطفال',
'بيف برجر'
];

let products=[
{id:1,name:'تشكن بروست 2قطع',price:165,category:'وجبات'},
{id:2,name:'تندر 3 قطع',price:199,category:'وجبات'},
{id:3,name:'قطعة بوست',price:59,category:'وجبات'},
{id:4,name:'قطعة تندر',price:59,category:'وجبات'},
{id:5,name:'تشكن رانش',price:165,category:'تشكن برجر'},
{id:6,name:'بطاطس',price:45,category:'اطباق جانبيه'},
{id:7,name:'مياه',price:10,category:'مشروبات'},
];

let cart=[];

/* رقم الفاتورة محفوظ */
let invoiceNumber = localStorage.getItem('invoiceNumber')
? Number(localStorage.getItem('invoiceNumber'))
: 1;

let lastItemNumber=0;

const productsGrid=document.getElementById('productsGrid');
const invoiceItems=document.getElementById('invoiceItems');

function toggleSettings(){

document.getElementById('settingsPanel').classList.toggle('active');

}

function renderCategories(){

const categoryButtons=document.getElementById('categoryButtons');

categoryButtons.innerHTML='';

const allBtn=document.createElement('button');

allBtn.className='category-btn';

allBtn.innerText='الكل';

allBtn.onclick=()=>renderProducts(products);

categoryButtons.appendChild(allBtn);

categories.forEach(cat=>{

const btn=document.createElement('button');

btn.className='category-btn';

btn.innerText=cat;

btn.onclick=()=>filterCategory(cat);

categoryButtons.appendChild(btn);

});

renderCategoryOptions();

}

function renderCategoryOptions(){

const select=document.getElementById('newCategory');

select.innerHTML='';

categories.forEach(cat=>{

const option=document.createElement('option');

option.value=cat;

option.innerText=cat;

select.appendChild(option);

});

}

function renderProducts(list=products){

productsGrid.innerHTML='';

list.forEach(product=>{

const btn=document.createElement('button');

btn.className='product-btn';

btn.innerHTML=`
${product.name}
<span class='product-price'>
${product.price} جنيه
</span>
`;

btn.onclick=()=>addToCart(product.id);

productsGrid.appendChild(btn);

});

renderProductsManagement();

}

function renderProductsManagement(){

const container=document.getElementById('productsManagement');

container.innerHTML='';

products.forEach(product=>{

const div=document.createElement('div');

div.className='manage-item';

div.innerHTML=`

<div>
<strong>${product.name}</strong>
<br>
${product.price} جنيه
</div>

<div style='display:flex;gap:5px'>

<button class='control-btn edit-btn' onclick='editProduct(${product.id})'>
تعديل
</button>

<button class='control-btn delete-btn' onclick='deleteProduct(${product.id})'>
حذف
</button>

</div>

`;

container.appendChild(div);

});

}

function addCategory(){

const value=document.getElementById('newCategoryName').value.trim();

if(!value)return;

categories.push(value);

document.getElementById('newCategoryName').value='';

renderCategories();

}

function addNewProduct(){

const name=document.getElementById('newName').value.trim();

const price=Number(document.getElementById('newPrice').value);

const category=document.getElementById('newCategory').value;

if(!name || !price)return;

products.push({
id:Date.now(),
name,
price,
category
});

document.getElementById('newName').value='';
document.getElementById('newPrice').value='';

renderProducts();

}

function editProduct(id){

const product=products.find(p=>p.id===id);

const name=prompt('اسم الصنف',product.name);

const price=prompt('السعر',product.price);

if(!name || !price)return;

product.name=name;

product.price=Number(price);

renderProducts();

updateInvoice();

}

function deleteProduct(id){

products=products.filter(p=>p.id!==id);

cart=cart.filter(i=>i.id!==id);

renderProducts();

updateInvoice();

}

function filterCategory(category){

renderProducts(products.filter(p=>p.category===category));

}

function addToCart(id){

const existing=cart.find(i=>i.id===id);

if(existing){

existing.qty++;

}else{

const product=products.find(p=>p.id===id);

lastItemNumber++;

cart.push({
...product,
qty:1,
lineNumber:lastItemNumber
});

}

updateInvoice();

}

function increaseQty(id){

const item=cart.find(i=>i.id===id);

item.qty++;

updateInvoice();

}

function decreaseQty(id){

const item=cart.find(i=>i.id===id);

if(item.qty>1){

item.qty--;

}else{

removeItem(id);

}

updateInvoice();

}

function removeItem(id){

cart=cart.filter(i=>i.id!==id);

updateInvoice();

}

function updateInvoice(){

invoiceItems.innerHTML='';

let total=0;

let count=0;

cart.forEach(item=>{

count += item.qty;

total += item.price * item.qty;

const div=document.createElement('div');

div.className='invoice-item';

div.innerHTML=`

<div>${item.price*item.qty}</div>

<div>${item.name}</div>

<div>${item.price}</div>

<div class='qty-box'>

<button class='qty-btn' onclick='increaseQty(${item.id})'>
+
</button>

${item.qty}

<button class='qty-btn' onclick='decreaseQty(${item.id})'>
-
</button>

</div>

<button class='remove-btn' onclick='removeItem(${item.id})'>
X
</button>

`;

invoiceItems.appendChild(div);

});

const discount=Number(document.getElementById('discountInput').value)||0;

const delivery=Number(document.getElementById('deliveryInput').value)||0;

const discountValue=total*(discount/100);

const finalTotal=total-discountValue+delivery;

document.getElementById('itemsCount').innerText=count;

document.getElementById('totalPrice').innerText=
finalTotal.toFixed(2)+' جنيه';

/* تحديث رقم الفاتورة */
document.getElementById('invoiceNumber').innerText = invoiceNumber;

}

function clearInvoice(){

if(confirm('مسح الفاتورة ؟')){

cart=[];

updateInvoice();

}

}

function printInvoice(){

if(cart.length===0){

alert('لا توجد أصناف');

return;

}

const discount=Number(document.getElementById('discountInput').value)||0;

const delivery=Number(document.getElementById('deliveryInput').value)||0;

let subtotal=0;

cart.forEach(item=>{

subtotal += item.price * item.qty;

});

const discountValue=subtotal*(discount/100);

const finalTotal=subtotal-discountValue+delivery;

let itemsHTML='';

cart.forEach(item=>{

itemsHTML += `

<tr>

<td>${item.name}</td>

<td>${item.qty}</td>

<td>${item.price}</td>

<td>${item.price*item.qty}</td>

</tr>

`;

});

const now=new Date();

const date=now.toLocaleDateString('ar-EG');

const time=now.toLocaleTimeString('ar-EG');

const qrText=`فاتورة رقم ${invoiceNumber}`;

const printWindow=window.open('','','width=400,height=700');

printWindow.document.write(`

<html dir="rtl">

<head>

<title>فاتورة</title>

<style>

body{
font-family:tahoma;
width:80mm;
margin:auto;
padding:10px;
}

.logo{
text-align:center;
font-size:40px;
font-weight:bold;
margin-bottom:10px;
}

.title{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.info{
display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:5px;
}

.line{
border-top:1px dashed #000;
margin:8px 0;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:5px;
text-align:center;
}

.total-box{
border:2px solid #000;
padding:10px;
margin-top:10px;
}

.total-row{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

.final{
font-size:22px;
font-weight:bold;
}

.qr{
text-align:center;
margin-top:15px;
}

.footer{
text-align:center;
font-size:16px;
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body onload="window.print();window.close()">

<div class="logo">
BARON
</div>

<div class="title">
فاتورة
</div>

<div class="info">
<div>${date}</div>
<div>${time}</div>
</div>

<div class="info">
<div>كاشير</div>
<div>رقم ${invoiceNumber}</div>
</div>

<div class="line"></div>

<table>

<thead>

<tr>

<th>الصنف</th>

<th>الكمية</th>

<th>السعر</th>

<th>الإجمالي</th>

</tr>

</thead>

<tbody>

${itemsHTML}

</tbody>

</table>

<div class="line"></div>

<div class="total-box">

<div class="total-row">
<span>المجموع</span>
<span>${subtotal}</span>
</div>

<div class="total-row">
<span>الخصم</span>
<span>${discountValue}</span>
</div>

<div class="total-row">
<span>الديليفري</span>
<span>${delivery}</span>
</div>

<div class="line"></div>

<div class="total-row final">
<span>الإجمالي</span>
<span>${finalTotal}</span>
</div>

</div>

<div class="qr">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(qrText)}">

</div>

<div class="footer">

خدمة التوصيل
<br>
01070004717

</div>

</body>

</html>

`);

printWindow.document.close();

/* زيادة رقم الفاتورة */

invoiceNumber++;

localStorage.setItem('invoiceNumber', invoiceNumber);

document.getElementById('invoiceNumber').innerText = invoiceNumber;

/* تصفير الفاتورة */

cart=[];

updateInvoice();

}

document.getElementById('searchInput').addEventListener('input',e=>{

const value=e.target.value.trim();

renderProducts(

products.filter(p=>p.name.includes(value))

);

});

/* تحميل البيانات */

renderCategories();

renderProducts();

/* عرض رقم الفاتورة الحالي */

document.getElementById('invoiceNumber').innerText = invoiceNumber;

updateInvoice();

</script>
