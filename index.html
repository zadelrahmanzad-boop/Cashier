<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامج الكاشير</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<script>
emailjs.init("begjqnjuweknxtcx"); 
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:#1f1f1f;overflow:hidden;}

.header{
height:70px;background:#111827;color:#fff;display:flex;
align-items:center;justify-content:center;font-size:28px;
font-weight:bold;position:relative;
}

.settings-btn{
position:absolute;left:20px;background:#0d6efd;border:none;
color:#fff;padding:10px 16px;border-radius:12px;cursor:pointer;
}

.container{display:grid;grid-template-columns:1fr 600px;}

.products-section{background:#2e3192;padding:15px;overflow:auto;}
.invoice-section{background:#0277bd;padding:15px;overflow:auto;}

.products-grid{
display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:12px;overflow-y:auto;max-height:calc(100vh - 220px);
}

.product-btn{background:#e5e5e5;border:none;border-radius:6px;padding:16px;font-weight:bold;cursor:pointer;}

.invoice-item{
display:grid;
grid-template-columns: 90px 2fr 80px 70px 50px;
gap:8px;
align-items:center;
background:#0288d1;
padding:6px;
color:#ffeb3b;
}

.qty-btn{background:#43a047;border:none;color:#fff;width:22px;height:22px;border-radius:6px;cursor:pointer;}
.remove-btn{background:#d50000;border:none;color:#fff;padding:6px;border-radius:6px;cursor:pointer;}

.summary{background:#01579b;padding:10px;border-radius:12px;margin-top:10px;color:#fff;}
.summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}

.action-btn{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;}
.print-btn{background:#00c853;color:#fff;}
.clear-btn{background:#d50000;color:#fff;}
</style>
</head>

<body>

<div class="header">
برنامج الكاشير
<button class="settings-btn" onclick="toggleSettings()">⚙</button>
</div>

<div class="container">

<div class="products-section">
<input id="searchInput" placeholder="بحث...">
<div id="productsGrid"></div>
</div>

<div class="invoice-section">

<div>فاتورة رقم: <span id="invoiceNumber">1</span></div>

<button class="action-btn print-btn" onclick="printInvoice()">طباعة</button>
<button class="action-btn clear-btn" onclick="clearInvoice()">مسح</button>

<div id="invoiceItems"></div>

<div class="summary">
<div class="summary-row">
<span>الإجمالي</span>
<span id="totalPrice">0</span>
</div>
</div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

let products = [
{id:1,name:"برجر",price:50},
{id:2,name:"بيتزا",price:120}
];

let cart = [];
let invoiceNumber = 1;

const productsGrid = document.getElementById("productsGrid");
const invoiceItems = document.getElementById("invoiceItems");

function renderProducts(){
productsGrid.innerHTML="";
products.forEach(p=>{
let btn=document.createElement("button");
btn.className="product-btn";
btn.innerText=`${p.name} - ${p.price}`;
btn.onclick=()=>addToCart(p.id);
productsGrid.appendChild(btn);
});
}

function addToCart(id){
let item = cart.find(i=>i.id===id);
if(item) item.qty++;
else {
let p = products.find(x=>x.id===id);
cart.push({...p,qty:1});
}
update();
}

function update(){
invoiceItems.innerHTML="";
let total=0;

cart.forEach(i=>{
total += i.price*i.qty;

let div=document.createElement("div");
div.className="invoice-item";
div.innerHTML=`
<div>${i.price*i.qty}</div>
<div>${i.name}</div>
<div>${i.price}</div>
<div>${i.qty}</div>
<div></div>
`;
invoiceItems.appendChild(div);
});

document.getElementById("totalPrice").innerText=total;
}

function clearInvoice(){
cart=[];
update();
}

function printInvoice(){
window.print();
invoiceNumber++;
document.getElementById("invoiceNumber").innerText=invoiceNumber;
}

document.getElementById("searchInput").addEventListener("input",e=>{
let v=e.target.value;
renderProducts(products.filter(p=>p.name.includes(v)));
});

renderProducts();
update();

});
</script>

</body>
</html>
