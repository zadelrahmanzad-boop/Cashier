<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامج الكاشير</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:#1f1f1f;
height:100vh;
overflow:hidden;
}

.header{
height:70px;
background:#111827;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
position:relative;
}

.settings-btn{
position:absolute;
left:20px;
background:#0d6efd;
border:none;
color:#fff;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:1fr 580px;
height:calc(100vh - 70px);
}

.products-section{
background:#2e3192;
padding:15px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.invoice-section{
background:#0277bd;
padding:15px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.search-box{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:15px;
font-size:16px;
}

.category-bar{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:15px;
}

.category-btn{
background:#6f2c91;
border:2px solid #8f5cff;
color:#fff;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
font-size:15px;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:12px;
overflow-y:auto;
flex:1;
padding-right:5px;
}

.products-grid::-webkit-scrollbar,
#invoiceItems::-webkit-scrollbar,
#settingsPanel::-webkit-scrollbar{
width:8px;
}

.products-grid::-webkit-scrollbar-thumb,
#invoiceItems::-webkit-scrollbar-thumb,
#settingsPanel::-webkit-scrollbar-thumb{
background:#ffeb3b;
border-radius:10px;
}

.product-btn{
background:#e5e5e5;
border:none;
border-radius:10px;
padding:14px;
cursor:pointer;
font-weight:bold;
font-size:17px;
min-height:90px;
color:#111;
transition:.2s;
}

.product-btn:hover{
transform:scale(1.03);
background:#fff;
}

.product-price{
display:block;
margin-top:8px;
color:#d00000;
font-size:16px;
}

.invoice-number{
color:#fff;
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.top-buttons{
display:flex;
gap:10px;
margin-bottom:10px;
}

.action-btn{
width:100%;
border:none;
padding:14px;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.print-btn{
background:#00c853;
color:#fff;
}

.clear-btn{
background:#d50000;
color:#fff;
}

.save-btn{
background:#673ab7;
color:#fff;
}

.invoice-header{
display:grid;
grid-template-columns:90px 2fr 80px 90px 50px;
gap:8px;
background:#01579b;
padding:10px;
border-radius:8px;
color:#ffeb3b;
font-weight:bold;
font-size:15px;
margin-bottom:10px;
}

#invoiceItems{
flex:1;
overflow-y:auto;
}

.invoice-item{
display:grid;
grid-template-columns:90px 2fr 80px 90px 50px;
gap:8px;
align-items:center;
background:#0288d1;
padding:8px;
border-radius:8px;
margin-bottom:8px;
color:#fff;
font-weight:bold;
font-size:14px;
}

.qty-box{
display:flex;
align-items:center;
justify-content:center;
gap:5px;
}

.qty-btn{
background:#43a047;
border:none;
color:#fff;
width:24px;
height:24px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.remove-btn{
background:#d50000;
border:none;
color:#fff;
padding:6px;
border-radius:6px;
cursor:pointer;
}

.summary{
background:#01579b;
padding:12px;
border-radius:12px;
margin-top:10px;
color:#fff;
}

.summary-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
padding:8px;
background:rgba(255,255,255,.08);
border-radius:8px;
font-weight:bold;
}

.summary input{
width:90px;
padding:6px;
border:none;
border-radius:6px;
text-align:center;
}

.total{
font-size:22px;
font-weight:bold;
color:#ffeb3b;
}

#settingsPanel{
position:fixed;
top:0;
left:-420px;
width:420px;
height:100%;
background:#fff;
z-index:999;
overflow:auto;
padding:20px;
transition:.4s;
}

#settingsPanel.active{
left:0;
}

.manage-item{
background:#f1f5f9;
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.control-btn{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
color:#fff;
}

.edit-btn{
background:#f59e0b;
}

.delete-btn{
background:#ef4444;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
margin-bottom:10px;
}

@media(max-width:900px){

body{
overflow:auto;
height:auto;
}

.container{
grid-template-columns:1fr;
height:auto;
}

.products-section{
height:55vh;
}

.invoice-section{
height:45vh;
}
@media print {

body{
background:#fff !important;
overflow:visible !important;
height:auto !important;
}

.header,
.products-section,
.settings-btn,
#settingsPanel,
.top-buttons,
.search-box,
.category-bar{
display:none !important;
}

.container{
display:block !important;
height:auto !important;
}

.invoice-section{
display:block !important;
position:relative !important;
overflow:visible !important;
height:auto !important;
width:78mm !important;
background:#fff !important;
color:#000 !important;
padding:5px !important;
margin:0 auto !important;
}

#invoiceItems{
overflow:visible !important;
height:auto !important;
}

.invoice-number{
color:#000 !important;
text-align:center;
font-size:18px;
margin-bottom:10px;
}

.invoice-header{
background:#fff !important;
color:#000 !important;
border-bottom:1px dashed #000;
padding-bottom:5px;
}

.invoice-item{
background:#fff !important;
color:#000 !important;
border-bottom:1px dashed #000;
border-radius:0;
padding:5px 0;
}

.summary{
background:#fff !important;
color:#000 !important;
border:1px solid #000;
margin-top:10px;
}

.summary-row{
background:#fff !important;
color:#000 !important;
padding:4px 0;
}

.total{
color:#000 !important;
font-size:18px;
}

.qty-btn,
.remove-btn{
display:none !important;
}
.invoice-header,
.invoice-item{
grid-template-columns:55px 1fr 45px 35px 0px !important;
font-size:11px !important;
gap:4px !important;
}
.qty-box{
display:flex !important;
justify-content:center !important;
font-size:11px !important;
}

.invoice-item div{
text-align:center;
}

.invoice-item div:nth-child(2){
text-align:right;
}
.invoice-item div{
word-break:break-word;
}

.invoice-item{
align-items:start !important;
}
}

</style>
</head>
<body>

<div class="header">
برنامج الكاشير
<button class="settings-btn" onclick="toggleSettings()">⚙ الإعدادات</button>
</div>

<div id="settingsPanel">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
<h2>الإعدادات</h2>

<button 
onclick="toggleSettings()" 
style="
background:#ef4444;
color:#fff;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
">
✖ إغلاق
</button>
</div>
<h3>إضافة قسم</h3>
<input type="text" id="newCategoryName" placeholder="اسم القسم">
<button class="action-btn print-btn" onclick="addCategory()">إضافة القسم</button>

<hr style="margin:20px 0">

<h3>إضافة صنف</h3>
<input type="text" id="newName" placeholder="اسم الصنف">
<input type="number" id="newPrice" placeholder="السعر">
<select id="newCategory"></select>
<button class="action-btn print-btn" onclick="addNewProduct()">إضافة الصنف</button>

<hr style="margin:20px 0">

<div id="productsManagement"></div>

</div>

<div class="container">

<div class="products-section">

<input type="text" id="searchInput" class="search-box" placeholder="بحث عن صنف">

<div class="category-bar" id="categoryButtons"></div>

<div class="products-grid" id="productsGrid"></div>

</div>

<div class="invoice-section">

<div class="invoice-number">
فاتورة رقم : <span id="invoiceNumber">1</span>
</div>

<div class="top-buttons">
<button class="action-btn print-btn" onclick="printInvoice()">طباعة</button>
<button class="action-btn clear-btn" onclick="clearInvoice()">مسح</button>
<button class="action-btn save-btn" onclick="showInvoices()">الفواتير</button>
</div>

<div class="invoice-header">
<div>الإجمالي</div>
<div>الصنف</div>
<div>السعر</div>
<div>الكمية</div>
<div></div>
</div>

<div id="invoiceItems">لا توجد أصناف</div>

<div class="summary">

<div class="summary-row">
<span>عدد الأصناف</span>
<span id="itemsCount">0</span>
</div>

<div class="summary-row">
<span>الخصم %</span>
<input type="number" id="discountInput" value="0" oninput="updateInvoice()">
</div>

<div class="summary-row">
<span>الديليفري</span>
<input type="number" id="deliveryInput" value="0" oninput="updateInvoice()">
</div>

<div class="summary-row total">
<span>الإجمالي</span>
<span id="totalPrice">0 جنيه</span>
</div>

</div>

</div>

</div>

<script>

let categories=[
'وجبات',
'مشروبات',
'تشكن برجر',
'اطباق جانبيه',
'إضافات',
'وجبات الأطفال',
'بيف برجر'
];

let products=[
{id:1,name:'تشكن بروست2قطع',price:165.00,category:'وجبات'},
{id:2,name:' تشكن بروست 4قطع',price:289.00,category:'وجبات'},
{id:3,name:' تشكن بروست 8قطع',price:589.00,category:'وجبات'},
{id:4,name:'اضافه الكومبو',price:50.00,category:'وجبات'},
{id:5,name:'قطعة فراخ',price:59.00,category:'وجبات'},
{id:6,name:'تندر 3 قطع',price:199.00,category:'وجبات'},
{id:7,name:'تندر5 قطع',price:299.00,category:'موجبات'},
{id:8,name:'قطعة بوست',price:59.00,category:'وجبات'},
{id:9,name:'قطعة تندر',price:59.00,category:'وجبات'},
{id:10,name:'مياه',price:10.00,category:'مشروبات'},
{id:11,name:'مياه غازيه',price:20.00,category:'مشروبات'},
{id:12,name:'تشكن بارو',price:165.00,category:'تشكن برجر'},
{id:13,name:'تشكن رانش',price:165.00,category:'تشكن برجر'},
{id:14,name:'سموكى تشكن',price:186.00,category:'تشكن برجر'},
{id:15,name:'هوت هانى تشكن رانش',price:185.00,category:'تشكن برجر'},
{id:16,name:'تشكن وينجز',price:150.00,category:'اطباق جانبيه'},
{id:17,name:'تشيزفرايز',price:80.00,category:'اطباق جانبيه'},
{id:18,name:'بطاطس مقليه باكيت',price:45.00,category:'اطباق جانبيه'},
{id:19,name:'بطاطس مقليه فاميلى',price:79.00,category:'مشروبات'},
{id:20,name:'رزبارو شيش',price:189.00,category:'مشروبات'},
{id:21,name:'ريزو بارو',price:99.00,category:'مشروبات'},
{id:22,name:'اونيون رينجز',price:59.00,category:'مشروبات'},
{id:23,name:'موزاريلا ستيكس4قطع',price:59.00,category:'مشروبات'},
{id:24,name:'شريحه بيكون',price:20.00,category:'إضافات'},
{id:25,name:'شريحة تركى مدخن',price:20.00,category:'إضافات'},
{id:26,name:'شيدر',price:30.00,category:'إضافات'},
{id:27,name:'رانش',price:20.00,category:'إضافات'},
{id:28,name:'بارو',price:20.00,category:'إضافات'},
{id:29,name:'باربكيو',price:20.00,category:'إضافات'},
{id:30,name:'صوص ثوم',price:20.00,category:'إضافات'},
{id:31,name:'هوت هانى',price:30.00,category:'إضافات'},
{id:32,name:'تشكن تشيز برجر',price:150.00,category:'وجبات الأطفال'},
{id:33,name:' بيف تشيز برجر',price:150.00,category:'وجبات الأطفال'},
{id:34,name:'تشكن أطفال',price:150.00,category:'وجبات الأطفال'},
{id:35,name:'تشيز برجر',price:215.00,category:'بيف برجر'},
{id:36,name:'مشروم برجر',price:225.00,category:'بيف برجر'},
{id:37,name:'بيكون برجر',price:235.00,category:'بيف برجر'},
{id:38,name:'سماش برجر',price:209.00,category:'بيف برجر'}
];

let cart=[];

let savedInvoices=
JSON.parse(localStorage.getItem('savedInvoices')) || [];

let invoiceNumber=
Number(localStorage.getItem('invoiceNumber')) || 1;

let lastItemNumber=0;

const productsGrid=document.getElementById('productsGrid');
const invoiceItems=document.getElementById('invoiceItems');

function toggleSettings(){
document.getElementById('settingsPanel').classList.toggle('active');
}

function renderCategories(){

const categoryButtons=document.getElementById('categoryButtons');
categoryButtons.innerHTML='';

const allBtn=document.createElement('button');
allBtn.className='category-btn';
allBtn.innerText='الكل';
allBtn.onclick=()=>renderProducts(products);
categoryButtons.appendChild(allBtn);

categories.forEach(cat=>{

const btn=document.createElement('button');
btn.className='category-btn';
btn.innerText=cat;
btn.onclick=()=>filterCategory(cat);
categoryButtons.appendChild(btn);

});

renderCategoryOptions();

}

function renderCategoryOptions(){

const select=document.getElementById('newCategory');
select.innerHTML='';

categories.forEach(cat=>{

const option=document.createElement('option');
option.value=cat;
option.innerText=cat;
select.appendChild(option);

});

}

function renderProducts(list=products){

productsGrid.innerHTML='';

list.forEach(product=>{

const btn=document.createElement('button');
btn.className='product-btn';
btn.innerHTML=`
${product.name}
<span class="product-price">${product.price} جنيه</span>
`;

btn.onclick=()=>addToCart(product.id);
productsGrid.appendChild(btn);

});

renderProductsManagement();

}

function filterCategory(category){
renderProducts(products.filter(p=>p.category===category));
}

function addToCart(id){

const existing=cart.find(i=>i.id===id);

if(existing){
existing.qty++;
}else{

const product=products.find(p=>p.id===id);

lastItemNumber++;

cart.push({
...product,
qty:1,
lineNumber:lastItemNumber
});

}

updateInvoice();

}

function increaseQty(id){
const item=cart.find(i=>i.id===id);
item.qty++;
updateInvoice();
}

function decreaseQty(id){

const item=cart.find(i=>i.id===id);

if(item.qty>1){
item.qty--;
}else{
removeItem(id);
}

updateInvoice();

}

function removeItem(id){
cart=cart.filter(i=>i.id!==id);
updateInvoice();
}

function updateInvoice(){

invoiceItems.innerHTML='';

if(cart.length===0){
invoiceItems.innerHTML='لا توجد أصناف';
}

let total=0;
let count=0;

cart.forEach(item=>{

count += item.qty;

const itemTotal=item.price*item.qty;

total += itemTotal;

const div=document.createElement('div');

div.className='invoice-item';

div.innerHTML=`
<div>${itemTotal}</div>
<div>${item.name}</div>
<div>${item.price}</div>
<div class="qty-box">
<button class="qty-btn" onclick="increaseQty(${item.id})">+</button>
${item.qty}
<button class="qty-btn" onclick="decreaseQty(${item.id})">-</button>
</div>
<button class="remove-btn" onclick="removeItem(${item.id})">X</button>
`;

invoiceItems.appendChild(div);

});

const discount=Number(document.getElementById('discountInput').value)||0;
const delivery=Number(document.getElementById('deliveryInput').value)||0;

const discountValue=total*(discount/100);
const finalTotal=total-discountValue+delivery;

document.getElementById('itemsCount').innerText=count;
document.getElementById('totalPrice').innerText=finalTotal.toFixed(2)+' جنيه';

}

function clearInvoice(){

if(confirm('مسح الفاتورة ؟')){

cart=[];

lastItemNumber=0;

document.getElementById('discountInput').value=0;
document.getElementById('deliveryInput').value=0;

updateInvoice();

}

}

function printInvoice(){

if(cart.length===0){
alert('لا توجد أصناف');
return;
}

window.print();

savedInvoices.push({
invoiceNumber,
date:new Date().toLocaleString('ar-EG'),
total:document.getElementById('totalPrice').innerText
});

localStorage.setItem('savedInvoices',JSON.stringify(savedInvoices));

invoiceNumber++;

localStorage.setItem('invoiceNumber',invoiceNumber);

document.getElementById('invoiceNumber').innerText=invoiceNumber;

cart=[];

lastItemNumber=0;

document.getElementById('discountInput').value=0;
document.getElementById('deliveryInput').value=0;

updateInvoice();

}
function showInvoices(){

if(savedInvoices.length===0){
alert('لا توجد فواتير محفوظة');
return;
}

let text='';

savedInvoices.forEach(inv=>{

text += `\n====================\nفاتورة رقم : ${inv.invoiceNumber}\nالتاريخ : ${inv.date}\nالإجمالي : ${inv.total}\n====================\n`;

});

alert(text);

}

function addCategory(){

const value=document.getElementById('newCategoryName').value.trim();

if(!value)return;

categories.push(value);

document.getElementById('newCategoryName').value='';

renderCategories();

}

function addNewProduct(){

const name=document.getElementById('newName').value.trim();
const price=Number(document.getElementById('newPrice').value);
const category=document.getElementById('newCategory').value;

if(!name || !price)return;

products.push({
id:Date.now(),
name,
price,
category
});

document.getElementById('newName').value='';
document.getElementById('newPrice').value='';

renderProducts();

}

function renderProductsManagement(){

const container=document.getElementById('productsManagement');
container.innerHTML='';

products.forEach(product=>{

const div=document.createElement('div');

div.className='manage-item';

div.innerHTML=`
<div>
<strong>${product.name}</strong><br>
${product.price} جنيه
</div>
<div style="display:flex;gap:5px">
<button class="control-btn edit-btn" onclick="editProduct(${product.id})">تعديل</button>
<button class="control-btn delete-btn" onclick="deleteProduct(${product.id})">حذف</button>
</div>
`;

container.appendChild(div);

});

}

function editProduct(id){

const product=products.find(p=>p.id===id);

const name=prompt('اسم الصنف',product.name);
const price=prompt('السعر',product.price);

if(!name || !price)return;

product.name=name;
product.price=Number(price);

renderProducts();
updateInvoice();

}

function deleteProduct(id){

products=products.filter(p=>p.id!==id);
cart=cart.filter(i=>i.id!==id);

renderProducts();
updateInvoice();

}

document.getElementById('searchInput').addEventListener('input',e=>{

const value=e.target.value.trim();

renderProducts(products.filter(p=>p.name.includes(value)));

});

renderCategories();
renderProducts();
updateInvoice();

</script>

</body>
</html>
